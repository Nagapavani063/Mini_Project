<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>House Price Prediction</title>

<style>
/* ===== FULL BACKGROUND ===== */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

/* ===== TOP HERO SECTION ===== */
.hero {
    text-align: center;
    padding: 40px 20px;
    color: white;
}

.profile-pic {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    object-fit: cover;
    border: 5px solid white;
    margin-bottom: 15px;
}

/* ===== FORM CONTAINER ===== */
.container {
    background: white;
    width: 900px;
    margin: auto;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    margin-bottom: 40px;
}

.subtitle {
    text-align: center;
    color: #555;
    margin-bottom: 25px;
}

form {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
}

input {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

button {
    grid-column: span 3;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #4CAF50;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #43a047;
}

/* ===== PREDICTION ===== */
.prediction {
    margin-top: 20px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    color: #2e7d32;
}

/* ===== FOOTER ===== */
.footer {
    text-align: center;
    margin-top: 20px;
    font-weight: bold;
    color: #333;
}
</style>
</head>

<body>

<!-- ===== PHOTO + TITLE ===== -->
<div class="hero">
    <img src="{{ url_for('static', filename='house.jpg') }}" class="profile-pic">
    <h1> House Price Prediction</h1>
    <p>PROJECT BY J.Nagapavani</p>
</div>

<!-- ===== FORM ===== -->
<div class="container">

<p class="subtitle">Enter house details to predict price</p>

<form method="POST" action="/predict">

<input name="bedrooms" placeholder="Bedrooms" required>
<input name="bathrooms" placeholder="Bathrooms" required>
<input name="sqft_living" placeholder="Sqft Living" required>

<input name="sqft_lot" placeholder="Sqft Lot">
<input name="floors" placeholder="Floors">
<input name="waterfront" placeholder="Waterfront (0/1)">

<input name="view" placeholder="View">
<input name="condition" placeholder="Condition">
<input name="sqft_above" placeholder="Sqft Above">

<input name="sqft_basement" placeholder="Sqft Basement">
<input name="yr_built" placeholder="Year Built">
<input name="yr_renovated" placeholder="Year Renovated">

<input name="city" placeholder="City">
<input name="country" placeholder="Country">
<input name="year" placeholder="Year">

<input name="month" placeholder="Month">
<input name="day" placeholder="Day">

<button type="submit">🔮 Predict Price</button>

</form>

{% if prediction_text %}
<div class="prediction">
    {{ prediction_text }}
</div>
{% endif %}

<div class="footer">
    © 2026 | House Price Prediction
</div>

</div>

</body>
</html>
